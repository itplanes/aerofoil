services:
  aerofoil:
    container_name: aerofoil-dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      # For write permission in config directory
      - PUID=1000
      - PGID=1000
      # Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL (default: INFO)
      - LOG_LEVEL=DEBUG
      # Optional SSD-backed staging path for NSP/XCI -> NSZ/XCZ conversion work
      - AEROFOIL_CONVERSION_STAGING_DIR=/app/conversion-tmp
      # to create/update an admin user at startup
      - USER_ADMIN_NAME=admin
      - USER_ADMIN_PASSWORD=admin
      # to create/update a regular user at startup
      # - USER_GUEST_NAME=guest
      # - USER_GUEST_PASSWORD=oerze!@8981
    volumes:
      - /your/game/directory:/games
      - ./config:/app/config
      - ./data:/app/data
      - ./conversion-tmp:/app/conversion-tmp
      # Mount source code for live development
      - ./app:/app
    ports:
      - "8465:8465"
