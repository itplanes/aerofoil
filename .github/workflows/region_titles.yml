# This is a basic workflow to help you get started with Actions

name: Build titledb

# Controls when the workflow will run
on:
  schedule:
    - cron: '0 */4 * * *'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Runs a set of commands using the runners shell
      - name: Setup folders
        run: |
          sudo apt update && sudo apt install -y libcurl4-openssl-dev libssl-dev
          git clone https://github.com/blawar/nut
          cd nut
          pip install -r requirements.txt
          mkdir build_artefacts
          git clone --depth=1 https://github.com/blawar/titledb
          titledb_commit=$(git -C titledb rev-parse --short HEAD)
          echo "formatted_date=$(date +"%Y-%m-%d_%H%M%S")" >> $GITHUB_ENV
          touch "build_artefacts/latest_${titledb_commit}"

      - uses: jannekem/run-python-script-action@v1
        name: Generate region titles
        with:
          script: |
            import os, sys
            import json

            os.chdir('nut')
            sys.path.append(os.getcwd())
            import nut

            def derive_base_title_id(app_id):
              app_id = str(app_id or '').strip().upper()
              if len(app_id) != 16:
                return None
              if app_id.endswith('000'):
                return app_id
              if app_id.endswith('800'):
                return f"{app_id[:-3]}000"
              try:
                return (hex(int(app_id[:-3], 16) - 1)[2:].rjust(len(app_id[:-3]), '0') + '000').upper()
              except Exception:
                return None

            generated_title_ids = set()

            with open('titledb/languages.json') as f:
              languages = json.load(f)
              languages = dict(sorted(languages.items()))
            for region in languages.keys():
              for language in languages[region]:
                  print(region, language)
                  nut.importRegion(region, language)
                  with open('titledb/titles.json', encoding='utf-8-sig') as titles_fp:
                    region_titles = json.load(titles_fp) or {}
                  for title_id in region_titles.keys():
                    title_id = str(title_id or '').strip().upper()
                    if title_id:
                      generated_title_ids.add(title_id)
                  os.rename('titledb/titles.json', f'build_artefacts/titles.{region}.{language}.json')

            with open('titledb/cnmts.json', encoding='utf-8-sig') as f:
              cnmts = json.load(f) or {}

            fixed_cnmts = dict(cnmts)
            generated_dlc_count = 0
            for title_id in sorted(generated_title_ids):
              title_key = title_id.lower()
              if title_key in fixed_cnmts:
                continue
              if title_id.endswith('000') or title_id.endswith('800'):
                continue
              base_title_id = derive_base_title_id(title_id)
              if not base_title_id or base_title_id not in generated_title_ids:
                continue
              fixed_cnmts[title_key] = {
                "0": {
                  "contentEntries": [],
                  "metaEntries": [],
                  "otherApplicationId": base_title_id.lower(),
                  "requiredApplicationVersion": 0,
                  "requiredSystemVersion": None,
                  "titleId": title_key,
                  "titleType": 130,
                  "version": "0",
                }
              }
              generated_dlc_count += 1

            print(f"Generated {generated_dlc_count} fallback DLC CNMT entries")
            with open('build_artefacts/cnmts-fixed.json', 'w', encoding='utf-8') as f:
              json.dump(fixed_cnmts, f, indent=4, sort_keys=True)

            for f in [
              'cnmts.json',
              'languages.json',
              'versions.json',
              'versions.txt',
            ]:
              os.rename(f'titledb/{f}', f'build_artefacts/{f}')
            

      - uses: actions/upload-artifact@v4
        with:
          name: titledb
          path: nut/build_artefacts/*
          compression-level: 9
